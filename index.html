var exposure = {
  type: jsPsychImageKeyboardResponse,
  data: { task: 'exposure' },
  stimulus: jsPsych.timelineVariable('image'),
  stimulus_width: 400,
  maintain_aspect_ratio: true,
  prompt: function(){
    return `<p style="font-size:30px;">${jsPsych.timelineVariable('word')}</p>`;
  },
  choices: "NO_KEYS",
  response_ends_trial: false,
  trial_duration: 6000,
  post_trial_gap: 500,

  on_start: function(trial) {
    trial._allow_listener_timeout = setTimeout(function() {
      var listener_registered_at = performance.now();

trial._kb_listener = jsPsych.pluginAPI.getKeyboardResponse({
      callback_function: function(info) {
        var press_time = performance.now();
        // Ignore if the press arrived before the listener opened
        if ((press_time - listener_registered_at) < 3000) {
          trial._kb_listener = jsPsych.pluginAPI.getKeyboardResponse({
            callback_function: function(info2) {
              jsPsych.finishTrial({ rt: info2.rt, key_press: info2.key });
            },
            valid_responses: [' '],
            rt_method: 'performance',
            persist: false
          });
          return;
        }
        jsPsych.finishTrial({ rt: info.rt, key_press: info.key });
      },
      valid_responses: [' '],
      rt_method: 'performance',
      persist: false
    });
  }, 3000);
},

  on_finish: function(data) {
    if (data.rt !== null && data.rt !== undefined) {
      data.rt_valid = data.rt >= 3000;
    } else {
      data.rt_valid = false;
    }
  }
};

  if (current_word_choices === null) {
    var correctWord = jsPsych.timelineVariable('word');
    var correctType = jsPsych.timelineVariable('type');
    var foils = word_stimuli.filter(s => s.type === correctType && s.word !== correctWord);
    var foil = foils[Math.floor(Math.random() * foils.length)].word;
    current_word_choices = jsPsych.randomization.shuffle([correctWord, foil]);
  }
  window._last_word_selection_choices = current_word_choices;
  return current_word_choices;
},

  button_html: '<button class="jspsych-btn" ' +
             'style="font-size:32px; padding:10px 20px; margin: 0 15px;">%choice%</button>',

  data: {
    task: 'word_selection',
    correct_response: jsPsych.timelineVariable('word')
  },
  post_trial_gap: 500,

on_finish: function(data) {
  var labels = window._last_word_selection_choices;
  data.foil = labels.find(w => w !== data.correct_response); // useful to log
  data.response_label = labels[data.response];
  data.correct = jsPsych.pluginAPI.compareKeys(
    data.response_label, data.correct_response
  );
    last_word_correct = data.correct;
    if (data.correct) {

}
